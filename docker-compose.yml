services:
  server:
    build: ./server
    container_name: ecommerce-server
    ports:
      - "3004:3000"
    env_file:
      - ./server/.env
    environment:
      SERVER_PORT: "3000"
    restart: unless-stopped

  client:
    build:
      context: ./client
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: ecommerce-client
    ports:
      - "8084:80"
    restart: unless-stopped
